<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="./script.js" defer></script>
    <title>Library</title>
  </head>
  <body>
    <div class="library">
      <h1>My Library</h1>
      <button command="show-modal" commandfor="form-dialog">
        Add New Book
      </button>
      <div class="book-container"></div>
    </div>
    <dialog id="form-dialog">
      <form id="book-form">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required />
        <label for="author">Author:</label>
        <input type="text" id="author" name="author" required />
        <label for="pages">Pages:</label>
        <input type="number" id="pages" name="pages" required />
        <label for="isRead">Read Already?</label>
        <input type="checkbox" id="isRead" name="isRead" />
        <div class="form-buttons">
          <button type="submit" id="submit-button">Add Book</button>
          <button
            type="button"
            command="close"
            commandfor="form-dialog"
            formnovalidate
          >
            Cancel
          </button>
        </div>
      </form>
    </dialog>
  </body>
</html>
