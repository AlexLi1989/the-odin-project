<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="./script.js" defer></script>
    <title>Tic Tac Toe</title>
  </head>
  <body>
    <div class="container">
      <h1>Tic Tac Toe</h1>
      <div class="new-players">
        <button class="new-players-btn">New Players</button>
        <input
          type="text"
          id="player-1"
          placeholder="Please enter player one name"
        />
        <input
          type="text"
          id="player-2"
          placeholder="Please enter player two name"
        />
      </div>
      <div class="new-game">
        <button class="new-game-btn">New Game</button>
      </div>
      <div class="scoreboard">
        <div class="player-1-card">
          <h2>Player 1 : <span></span></h2>
          <p>Score: <span></span></p>
        </div>
        <div class="player-2-card">
          <h2>Player 2 : <span></span></h2>
          <p>Score: <span></span></p>
        </div>
        <div class="current-player">
          <h3>Current Player : <span></span></h3>
        </div>
        <div class="warning"><p></p></div>
        <div class="result"><p></p></div>
      </div>
      <div class="board"></div>
    </div>
  </body>
</html>
